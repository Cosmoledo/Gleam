name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_call:

concurrency:
    group: verify-${{ github.sha }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "npm"

            - run: npm ci

            - run: npx playwright install --with-deps chromium

            - run: bash scripts/verify.sh
